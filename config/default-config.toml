# Hark default settings.
#
# Hark reads its config from the OS config dir:
#   Windows: %APPDATA%\hark\config.toml
#   macOS:   ~/Library/Application Support/hark/config.toml
# Every key is optional; a missing file or missing key uses the defaults
# shown here.
#
# API keys NEVER live in this file. Set the HARK_STT_KEY environment
# variable (dev), or store a key in the OS keychain under service "hark"
# with the provider label as the account name (e.g. "deepgram").

[provider]
kind = "deepgram"    # deepgram | openai | groq | openai-compatible
# base_url and model default per kind:
#   deepgram -> https://api.deepgram.com, nova-3
#   openai   -> https://api.openai.com/v1, gpt-4o-mini-transcribe
#   groq     -> https://api.groq.com/openai/v1, whisper-large-v3-turbo
# "openai-compatible" is the escape hatch for any other server speaking the
# multipart /audio/transcriptions contract; it requires an explicit base_url.
# base_url = "https://api.deepgram.com"
# model = "nova-3"

[hotkey]
# Push-to-talk chord: hold ALL listed keys to record, release any to stop.
# "+"-separated key names, e.g. "LCtrl+LWin", "RCtrl", "F13".
ptt_key = "LCtrl+LWin"

[audio]
preroll_ms = 300      # audio kept from before the chord registers
tail_ms = 150         # audio kept after release (trailing word endings)
max_hold_s = 120      # cap; on exceed, transcribe what we have
min_speech_ms = 250   # shorter holds are dropped (no network request)
silence_rms = 0.01    # drop clips whose loudest 100 ms window is quieter than this

[inject]
strategy = "clipboard"        # clipboard | type
set_paste_delay_ms = 50       # clipboard set -> synthesized Ctrl+V
paste_restore_delay_ms = 50   # Ctrl+V -> restore the old clipboard
clipboard_retries = 8         # bounded retries while the clipboard is busy

[dictionary]
# Canonical terms (names, jargon, product words). Transcript spans that
# sound like a term but are spelled wrong are replaced with the canonical
# spelling; the same list also feeds provider biasing. The pre-Phase-2 key
# name "bias_terms" still works.
terms = []

[local_stt]
# Opt-in on-device transcription. The model is NOT shipped with Hark; it is
# downloaded on demand from Settings -> On-device model (~670 MB on disk,
# ~1.2 GB of RAM once loaded).
#
#   off       never used (default)
#   fallback  cloud first; the local model rescues a failed or timed-out request
#   primary   local only; no provider is contacted and no API key is required
mode = "off"
model = "parakeet-tdt-0.6b-v3-int8"
threads = 2
# Cloud request budget used INSTEAD of the usual 15 s, but only while a
# downloaded model is standing by. Waiting the full 15 s and then decoding
# locally would make a rescued dictation slower than no fallback at all.
fallback_after_ms = 6000

# Invocations: say a trigger phrase, get a fixed block of text you wrote.
# The expansion is injected byte for byte and never goes through a cleanup
# voice, so it cannot be reworded on the way to the cursor. A dictation that
# fires one also skips the cleanup call entirely.
#
#   scope = "utterance"  the phrase must be the WHOLE dictation (default)
#   scope = "anywhere"   the phrase is spliced into a longer sentence
#
# A trigger needs at least two words, a non-empty expansion, and a phrase no
# earlier entry already uses. Entries failing any of those are skipped at
# startup rather than failing the config; the Invocations page marks each one
# with the reason.
#
# This section stays LAST: [[...]] array-of-tables entries must follow every
# scalar key, which is also where Hark writes it when it saves.
#
# [[invocations.entries]]
# phrase = "access granted"
# scope = "utterance"
# expansion = """
# You have access to the Support Forge tools: ticketing, remote assist,
# and the asset inventory.
# """
